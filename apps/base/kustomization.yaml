
# ArgoCD ApplicationSet — generates one Application per environment
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: project_lab
  namespace: argocd
spec:
  generators:
    - list:
        elements:

          - env: dev

          - env: staging

          - env: prod

  template:
    metadata:
      name: "project_lab-{{env}}"
    spec:
      project: default
      source:
        repoURL: https://github.com/mto79/project_lab-gitops
        targetRevision: main
        path: "apps/overlays/{{env}}"
      destination:
        server: https://kubernetes.default.svc
        namespace: "{{env}}"
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true

